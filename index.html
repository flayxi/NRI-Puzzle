 (mm)":4.5,"8 mm Length":"—","12 mm Length":"RONYX45012UX","15 mm Length":"RONYX45015UX","18 mm Length":"RONYX45018UX","22 mm Length":"RONYX45022UX","26 mm Length":"RONYX45026UX","30 mm Length":"RONYX45030UX","34 mm Length":"—","38 mm Length":"—"},{"Stent diameter (mm)":5,"8 mm Length":"—","12 mm Length":"RONYX50012UX","15 mm Length":"RONYX50015UX","18 mm Length":"RONYX50018UX","22 mm Length":"RONYX50022UX","26 mm Length":"RONYX50026UX","30 mm Length":"RONYX50030UX","34 mm Length":"—","38 mm Length":"—"}]',tablecaption:"Catalogue",comments:`The Resolute Onyx system is a medical device used for the treatment of coronary artery disease. It consists of a drug-eluting stent and a delivery system. The stent is constructed with a cobalt-based alloy shell and a platinum-iridium alloy core. It is coated with zotarolimus, which is a drug that inhibits the activity of protein kinase mTOR, leading to the suppression of cell cycle progression.

The stents are available in various lengths and diameters to accommodate different vessel sizes. They are designed for use in small, medium, large, and extra-large vessels. The delivery system includes a balloon for stent deployment, and it can be used with specific guidewires and guide catheters.

The stent delivery balloon is made of a single-layer Pebax material and is wrapped over an inner member tubing. It features two radiopaque marker bands that help locate the stent edges during the deployment process.

The nominal inflation pressure for the balloon is 12 ATM (1216 kPa), and the rated burst pressure varies depending on the stent size. For stents with diameters ranging from 2.25mm to 4.0mm, the burst pressure is 18 ATM (1824 kPa). For the RX delivery system, which is used for stents with diameters of 4.5mm to 5.0mm, the burst pressure is 16 ATM (1621 kPa).

The minimum inner diameter of the guide catheter required for the system is 5 F (1.42 mm, 0.056 in). The catheter shaft outer diameter differs based on the delivery system used. For the RX system, the proximal shaft outer diameter ranges from 2.1 F (0.69 mm) to 3.2 F (1.07 mm), while the distal shaft outer diameter ranges from 2.7 F (0.91 mm) to 3.2 F (1.07 mm). For the OTW system, the proximal shaft outer diameter is 3.4 F (1.12 mm), and the distal shaft outer diameter is 2.7 F (0.91 mm).

The Resolute Onyx system has undergone biocompatibility testing to ensure its safety. This testing includes evaluations for cytotoxicity, sensitization, systemic toxicity, genotoxicity, and hemocompatibility.`},{type:"Stent",name:"Resolute Onyx RX 4.5-5.0 mm",manufacturer:"Medtronic",Description:"Balloon mounted coronary stent. Can be used off-label for intracranial atherosclerotic disease. Available in rapid exchange (RX) and over-the-wire (OTW) versions. Has a drug/polymer coating component, which consists of a formulation of zotarolimus contained in a BioLinx polymer.",url1:"https://www.medtronic.com/us-en/healthcare-professionals/products/cardiovascular/stents/resolute-onyx-des.html",url2:"https://www.accessdata.fda.gov/cdrh_docs/pdf16/P160043B.pdf",minid:.0145,maxod:.042,length:140,sizetable:'[{"Stent diameter (mm)":2,"8 mm Length":"RONYX20008UX","12 mm Length":"RONYX20012UX","15 mm Length":"RONYX20015UX","18 mm Length":"RONYX20018UX","22 mm Length":"RONYX20022UX","26 mm Length":"RONYX20026UX","30 mm Length":"RONYX20030UX","34 mm Length":"—","38 mm Length":"—"},{"Stent diameter (mm)":2.25,"8 mm Length":"RONYX22508UX","12 mm Length":"RONYX22512UX","15 mm Length":"RONYX22515UX","18 mm Length":"RONYX22518UX","22 mm Length":"RONYX22522UX","26 mm Length":"RONYX22526UX","30 mm Length":"RONYX22530UX","34 mm Length":"RONYX22534UX","38 mm Length":"RONYX22538UX"},{"Stent diameter (mm)":2.5,"8 mm Length":"RONYX25008UX","12 mm Length":"RONYX25012UX","15 mm Length":"RONYX25015UX","18 mm Length":"RONYX25018UX","22 mm Length":"RONYX25022UX","26 mm Length":"RONYX25026UX","30 mm Length":"RONYX25030UX","34 mm Length":"RONYX25034UX","38 mm Length":"RONYX25038UX"},{"Stent diameter (mm)":2.75,"8 mm Length":"RONYX27508UX","12 mm Length":"RONYX27512UX","15 mm Length":"RONYX27515UX","18 mm Length":"RONYX27518UX","22 mm Length":"RONYX27522UX","26 mm Length":"RONYX27526UX","30 mm Length":"RONYX27530UX","34 mm Length":"RONYX27534UX","38 mm Length":"RONYX27538UX"},{"Stent diameter (mm)":3,"8 mm Length":"RONYX30008UX","12 mm Length":"RONYX30012UX","15 mm Length":"RONYX30015UX","18 mm Length":"RONYX30018UX","22 mm Length":"RONYX30022UX","26 mm Length":"RONYX30026UX","30 mm Length":"RONYX30030UX","34 mm Length":"RONYX30034UX","38 mm Length":"RONYX30038UX"},{"Stent diameter (mm)":3.5,"8 mm Length":"RONYX35008UX","12 mm Length":"RONYX35012UX","15 mm Length":"RONYX35015UX","18 mm Length":"RONYX35018UX","22 mm Length":"RONYX35022UX","26 mm Length":"RONYX35026UX","30 mm Length":"RONYX35030UX","34 mm Length":"RONYX35034UX","38 mm Length":"RONYX35038UX"},{"Stent diameter (mm)":4,"8 mm Length":"RONYX40008UX","12 mm Length":"RONYX40012UX","15 mm Length":"RONYX40015UX","18 mm Length":"RONYX40018UX","22 mm Length":"RONYX40022UX","26 mm Length":"RONYX40026UX","30 mm Length":"RONYX40030UX","34 mm Length":"RONYX40034UX","38 mm Length":"RONYX40038UX"},{"Stent diameter (mm)":4.5,"8 mm Length":"—","12 mm Length":"RONYX45012UX","15 mm Length":"RONYX45015UX","18 mm Length":"RONYX45018UX","22 mm Length":"RONYX45022UX","26 mm Length":"RONYX45026UX","30 mm Length":"RONYX45030UX","34 mm Length":"—","38 mm Length":"—"},{"Stent diameter (mm)":5,"8 mm Length":"—","12 mm Length":"RONYX50012UX","15 mm Length":"RONYX50015UX","18 mm Length":"RONYX50018UX","22 mm Length":"RONYX50022UX","26 mm Length":"RONYX50026UX","30 mm Length":"RONYX50030UX","34 mm Length":"—","38 mm Length":"—"}]',tablecaption:"Catalogue",comments:`The Resolute Onyx system is a medical device used for the treatment of coronary artery disease. It consists of a drug-eluting stent and a delivery system. The stent is constructed with a cobalt-based alloy shell and a platinum-iridium alloy core. It is coated with zotarolimus, which is a drug that inhibits the activity of protein kinase mTOR, leading to the suppression of cell cycle progression.

The stents are available in various lengths and diameters to accommodate different vessel sizes. They are designed for use in small, medium, large, and extra-large vessels. The delivery system includes a balloon for stent deployment, and it can be used with specific guidewires and guide catheters.

The stent delivery balloon is made of a single-layer Pebax material and is wrapped over an inner member tubing. It features two radiopaque marker bands that help locate the stent edges during the deployment process.

The nominal inflation pressure for the balloon is 12 ATM (1216 kPa), and the rated burst pressure varies depending on the stent size. For stents with diameters ranging from 2.25mm to 4.0mm, the burst pressure is 18 ATM (1824 kPa). For the RX delivery system, which is used for stents with diameters of 4.5mm to 5.0mm, the burst pressure is 16 ATM (1621 kPa).

The minimum inner diameter of the guide catheter required for the system is 5 F (1.42 mm, 0.056 in). The catheter shaft outer diameter differs based on the delivery system used. For the RX system, the proximal shaft outer diameter ranges from 2.1 F (0.69 mm) to 3.2 F (1.07 mm), while the distal shaft outer diameter ranges from 2.7 F (0.91 mm) to 3.2 F (1.07 mm). For the OTW system, the proximal shaft outer diameter is 3.4 F (1.12 mm), and the distal shaft outer diameter is 2.7 F (0.91 mm).

The Resolute Onyx system has undergone biocompatibility testing to ensure its safety. This testing includes evaluations for cytotoxicity, sensitization, systemic toxicity, genotoxicity, and hemocompatibility.`},{type:"Stent",name:"CGuard Embolic Prevention System",manufacturer:"InspireMD",Description:'"The CGuardTM Embolic Prevention System (EPS) is a novel mesh carotid stent designed to improve patient safety through sustained embolic protection."',url1:"https://www.inspiremd.com/en/product/cguard/",minid:.0145,maxod:.08,maxod_cat:.0855,length:135,sizetable:'[{"Length":"20 mm","6mm":"CRX0620","7mm":"CRX0720","8mm":"CRX0820","9mm":"CRX0920","10mm":"CRX1020"},{"Length":"30 mm","6mm":"CRX0630","7mm":"CRX0730","8mm":"CRX0830","9mm":"CRX0930","10mm":"CRX1030"},{"Length":"40 mm","6mm":"CRX0640","7mm":"CRX0740","8mm":"CRX0840","9mm":"CRX0940","10mm":"CRX1040"},{"Length":"60 mm","6mm":"CRX0660","7mm":"Not available","8mm":"CRX0860","9mm":"Not available","10mm":"CRX1060"}]',tablecaption:"Catalogue",comments:`The CGuardTM Embolic Prevention System (EPS) is an innovative mesh carotid stent. The stent has a dual-layer design, combining the largest open-cell frame among carotid stents with the smallest mesh pore size. This design includes the MicroNetTM technology, which effectively prevents plaque protrusion through the stent, ensuring long-lasting embolic protection for up to 48 months. Additionally, the SmartFitTM technology eliminates the need for a tapered version and ensures accurate apposition to the vessel wall. The CGuardTM EPS is specifically designed to minimize the risk of both early and late embolism. It achieves this by trapping potential emboli against the arterial wall while maintaining blood flow to the external carotid artery.

Data from the PARADIGM-Extend study demonstrate sustained embolic protection provided by CGuardTM EPS over a 48-month follow-up period. The study included patients with symptomatic or high-stroke-risk asymptomatic carotid stenosis. The results showed minimal occurrence of strokes, stroke-related deaths, and other vascular accidents throughout the follow-up duration.

The deployment of CGuardTM EPS is facilitated by the rapid exchange (Rx) system. This system delivers the self-expanding stent to the carotid artery, where it adjusts to the vessel diameter without the need for a tapered design. 

The CGuardTM EPS is indicated for improving carotid luminal diameter in high-risk patients who require carotid revascularization. It is suitable for patients with neurological symptoms and over 50% stenosis of the common or internal carotid artery or patients without neurological symptoms and over 80% stenosis. The target vessel should have reference diameters between 4.8 mm and 9.0 mm. The stent is made of Nitinol, while the MicroNetTM material is composed of Polyethylene Terephthalate (PET).
