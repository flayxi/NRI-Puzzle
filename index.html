ybrid Thrombectomy Device is the third generation of Acandis stent retriever featuring a perfect interplay in acute ischaemic strokes:"',url1:"https://www.acandis.com/aperio-hybrid-thrombectomy-device-136-en",url2:"https://www.acandis.com/down/uploads/aperio-hybrid-brochure_373_1573059457.pdf",minid:0,maxod:.02,length:"?","Vessel diameters":"1.5 - 5.5 mm",material:'"Three distal platinum iridium device markers for  permanent control of device position and opening behaviour.Two radiopaque DFT wires featuring full length visibility  for precise alignment and additional control during procedure.One proximal platinum iridium device marker for  precise positioning within the thrombus."',features:'" The proven hybrid cell design leads to reliable and fast flow restoration. Small closed cells ensure a perfect vessel wall apposition and expansion into the clot. Large open cells with integrated anchoring elements assure efficient clot retention for reliable and atraumatic retrieval even in tortuous vessel anatomies. In combination, these two cell designs build up a functional segment."'},{type:"Stent Retriever",name:"APERIO Hybrid 17",manufacturer:"Acandis",url1:"https://www.acandis.com/aperio-hybrid17-thrombectomy-device-137-en",minid:0,maxod:.0155,length:"?","Vessel diameters":"1.0 mm minimum",material:'"Three distal platinum iridium device markers for  permanent control of device position and opening behaviour.Two radiopaque DFT wires featuring full length visibility  for precise alignment and additional control during procedure.One proximal platinum iridium device marker for  precise positioning within the thrombus."',features:'" The proven hybrid cell design leads to reliable and fast flow restoration. Small closed cells ensure a perfect vessel wall apposition and expansion into the clot. Large open cells with integrated anchoring elements assure efficient clot retention for reliable and atraumatic retrieval even in tortuous vessel anatomies. In combination, these two c ://web.archive.org/web/20181123084934/http://synthes.vo.llnwd.net/o16/LLNWMB8/US%20Mobile/Synthes%20North%20America/Product%20Support%20Materials/Brochures/Router7031_NS-01-002_CNV_AllAccessGuide.pdf",minid:.021,maxod:.037,length:"135 / 150"},{type:"Microcatheter",name:"Courier 170",manufacturer:"Cerenovus",minid:.017,maxod:.03,length:"150"},{type:"Microcatheter",name:"Courier 190",manufacturer:"Cerenovus",minid:.019,maxod:.032,length:"150"},{type:"stent",name:"Enterprise 2",manufacturer:"Cerenovus",Description:'"Based upon the principles of the original CODMAN ENTERPRISE® stent design, the CODMAN ENTERPRISE® 2 Vascular Reconstruction Device has been enhanced to improve conformability and wall apposition while maintaining the significant benefits of its closed cell design."',url1:"https://web.archive.org/web/20190819044215/http://synthes.vo.llnwd.net/o16/LLNWMB8/INT%20Mobile/Synthes%20International/Product%20Support%20Material/legacy_Synthes_PDF/DSEM-COD-0216-0174_LR.pdf",minid:0,maxod:.02,length:"?","Vessel diameters":"2.0 - 4.0 mm",Sizes:"16 - 39 mm",design:"Self-expandable laser cut closed cell with variable strut width.",Resheathable:"Yes",features:'"Stent Positioning Marker: A fluoroscopic guide helps provide precise deployment at the aneurysm neck.  Enhanced closed cell design: The closed cells were redesigned allowing the stent to better expand and contract in vessel tortuosity, optimizing wall apposition.  Recapturable stent: The closed cell design allows for deployment and recapture, facilitating precise placement. 0.021” Microcatheter delivery: Allowing easy, precise navigation 99.8% of the time.  Stent markers: New solid platinum stent markers with increased radiopacity provide clear visibility of the device during and after deployment. Coil mass support: The CODMAN ENTERPRISE® 2 Stent has the highest point load force measurements, demonstrating its ability to effectively support the coil mass. Minimal foreshortening: The CODMAN ENTERPRISE® Stent deploys ated outer cage serves to engage and grip the clot. Multiple, large, inlet windows on the outer cage allow thrombus to move into the outer cage. An articulating outer cage maintains wall apposition during retrieval. Closed cell inner channel: Secures and stabilizes the thrombus to maintain engagement. Distal closed end mesh: Maintains control of thrombus during retrieval."'},{type:"Stent Retriever",name:"Embotrap III 6.5x45",manufacturer:"Cerenovus",image:"embotrap3.png",Description:'"The EMBOTRAP® III Revascularization Device is designed for use in the anterior and posterior neurovasculature in vessels such as the internal carotid artery, the M1 or M2 segments of the middle cerebral artery, and basilar arteries. The EMBOTRAP Platform is indicated for vessels from 5.0mm down to 1.5mm and is the only dual layer design, designed to engage and grip the clot differently.  EMBOTRAP® III Device has been shown to retrieve various thrombus types, whether fibrin-rich thrombus (hard) or RBC-rich thrombus types (soft)."',url1:"https://www.jnjmedicaldevices.com/en-US/product/embotrap-iii-revascularization-device",minid:0,maxod:.02,length:196,Code:"ET309645",features:'"Open and articulated outer cage: Open, articulated outer cage serves to engage and grip the clot. Multiple, large, inlet windows on the outer cage allow thrombus to move into the outer cage. An articulating outer cage maintains wall apposition during retrieval. Closed cell inner channel: Secures and stabilizes the thrombus to maintain engagement. Distal closed end mesh: Maintains control of thrombus during retrieval."'},{type:"Liquid Embolic",name:"TRUFILL® n-BCA",manufacturer:"Cerenovus",image:"trufill.jpg",Description:'"The TRUFILL® n-BCA Liquid Embolic System is used under fluoroscopic guidance to obstruct or reduce blood flow to cerebral arteriovenous malformations (AVMs) via super-selective catheter delivery when pre-surgical devascularization is desired. The TRUFILL n-BCA System offers: Low Procedure Time, Low Fluoroscopy Time, Fewer Adverse ClinicalComplications, Effective Penetration of AVM."',url1:"https://www.jnjmedicaldevices.com/en-US/product/trufill-n-bca-liquid-embolic-system",minid:0,maxod:.008,length:"?",sizetable:'[{"Condition":"Intranidal injections without AV fistulae or high flow rates in order to more deeply penetrate the nidus","TRUFILL® Ethiodized Oil: n-BCA Ratio":"3:1 - 75% Eth. Oil / 25% n-BCA","TRUFILL® Ethiodized Oil: n-Volume (cc)":0.75,"TRUFILL® n-BCA Ratio (cc)":0.25},{"Condition":"Intranidal injections without AV fistulae or high flow rates in order to more deeply penetrate the nidus","TRUFILL® Ethiodized Oil: n-BCA Ratio":"2:1 - 67% Eth. Oil / 33% n-BCA","TRUFILL® Ethiodized Oil: n-Volume (cc)":0.67,"TRUFILL® n-BCA Ratio (cc)":0.33},{"Condition":"Feeding pedicle injections close to the nidus at high flow rates where venous opacification occurs on contrast injections within ½ second","TRUFILL® Ethiodized Oil: n-BCA Ratio":"1:1 - 50% Eth. Oil / 50% n-BCA","TRUFILL® Ethiodized Oil: n-Volume (cc)":0.5,"TRUFILL® n-BCA Ratio (cc)":"0.50 (tantalum advised)"},{"Condition":"Feeding pedicle injections close to the nidus at high flow rates where venous opacification occurs on contrast injections within ½ second","TRUFILL® Ethiodized Oil: n-BCA Ratio":"1:2 - 33% Eth. Oil / 67% n-BCA","TRUFILL® Ethiodized Oil: n-Volume (cc)":0.33,"TRUFILL® n-BCA Ratio (cc)":"0.67 (tantalum advised)"}]',tablecaption:"Recommended Mixtures (Listed volumes based on a total volume of 1.0 cc - actual total volumes may vary)",comments:'"Tantalum Powder may also be added to ethiodized oil to augment radiopacity. Tantalum powder should not be used alone with n-BCA. At higher n-BCA concentrations (>50%), addition of up to 0.5g tantalum powder is advised."',Cautions:'"WARNING: A 0:1 TRUFILL Ethiodized Oil to TRUFILL n-BCA ratio should never be used. Recommended mixtures based  on the N-Butyl Cyanoacrylate Embolization of Cerebral Arteriovenous Malformations Study (N-Butyl Cyanoacrylate Embolization of Cerebral Arteriovenous Malformations: Results of a Prospective, Randomized, Multi-center Trial, AJNR 23: 748-755, May 2002)"'},{type:"Stent Retriever",name:"Nimbus",manufacturer:"Cerenovus",image:"nimbus.png",Description:'"CERENOVUS NIMBUS™ is designed to remove tough clots* to restore blood flow. CERENOVUS NIMBUS™ has 5 radiopaque markers to facilitate device positioning. 0.021” microcatheter compatible. The device is designed for use in the anterior and posterior neurovasculature in vessels of diameter 1.5 mm to 5.0 mm, such as the internal carotid artery, the M1 and M2 segments of the middle cerebral artery, the A1 and A2 segments of the anterior cerebral artery, the basilar, the posterior cerebral and the vertebral arteries."',url1:"https://www.jnjmedicaldevices.com/en-EMEA/product/cerenovus-nimbus-geometric-clot-extractor",url2:"https://neurorad.kukm-aussteller.de/files/firmen_content/CERENOVUS/NIMBUS.pdf",ifu:"http://synthes.vo.llnwd.net/o16/LLNWMB8/INT%20Mobile/Synthes%20International/MSY-EOS/CS071-01-Rev-07-Attachment-03.pdf",minid:0,maxod:.02,length:192.7,Code:"GCE4528","Vessel diameters":"1.5 mm to 5.0 mm",Sizes:"4.5 x 28 mm",comments:`<p>Intended to be used as a "rescue" stent retriever for tough clots. Some tips may be obtained from reading the IFU document: </p>

<p>The device should be positioned in the clot ideally such that the end of the proximal radiopaque coil (Figure 2) is aligned with the proximal face of the clot. While stabilizing the Device shaft, retract the microcatheter to deploy the Device within the clot. The Device will be fully deployed once the distal tip of the Microcatheter has been retracted to a position over the proximal radiopaque coil of the Device. After deployment, the device may be left to embed in the clot for up to 5 minutes prior to withdrawal. </p>

<p>Prior to clot retrieval re-advance the microcatheter to the clot while holding the CERENOVUS NIMBUS™ push wire static. Do not continue to advance against significant resistance. </p>

<p>Withdraw the Device and microcatheter slowly and carefully as a single unit to the Guide or Intermediate Catheter while aspirating through the guide or Intermediate Catheter maintaining microcatheter and 
CERENOVUS NIMBUS™ position relative to each other during the withdrawal step. Applying vigorous aspiration (by syringe), withdraw the Device and microcatheter into the Guide or Intermediate Catheter and continue to aspirate until the Device reaches the proximal RHV. Note: If withdrawal in to the guide or intermediate catheter is difficult (as may be the case with a large clot burden) then deflate the balloon (if applicable) and withdraw the guide or intermediate catheter, 
microcatheter and Device together through the introducer sheath.</p>

<p> Disconnect the RHV from the Guide Catheter and remove the Device, microcatheter and RHV together from the Guide Catheter. Use a syringe to further aspirate the Guide and/or Intermediate Catheter to ensure it is clear of any thrombus material. </p>

<p>The Device may be used for up to three retrieval attempts. If an additional pass is to be made with the Device then carefully remove any captured thrombus from the Device and clean the Device in heparinized saline, rubbing gently from proximal to distal to remove any 
residual thrombus material. Inspect the Device carefully and if any damage or deformity is observed do not use the Device – instead use a new Device for any subsequent passes. If using the same Device, replace 
the Insertion Tool onto the proximal shaft and retract the Device into the Insertion Tool until it is fully resheathed. Do not retract the device into the Insertion Tool against significant resistance – ascertain the cause of the resistance and if required use a new device for any subsequent passes. Do not attempt more than three retrieval attempts in one vessel.</p>`,material:"Nitinol",design:'Three-dimensional nitinol cage assembly at the distal end of a tapered nitinol shaft. There is a proximal coil which is radiopaque for positioning guidance. The NIMBUS has spiral cells with multiple pinch points amd wide opening angles to pull out tough clots. There are mid markers for positioning and to delineate the end of the spiral section. There is a "barrel section" to maintain control of the clot during retrieval and to funnel the clot/device into the receiving catheter. There are also distal markers.'},{type:"catheter",name:"Emboguard",manufacturer:"Cerenovus",Description:'"EMBOGUARD Balloon Guide Catheter is a dual lumen, braid-reinforced, variable stiffness catheter with an eccentric inflation lumen, a radiopaque marker on the distal end and a bifurcated luer hub on the proximal end. A compliant balloon is mounted on the distal end. The distal end of the device shaft has a hydrophilic coating. Balloon Guide Catheter dimensions are indicated on the product label."',url1:"https://www.jnjmedtech.com/en-US/product/emboguard-balloon-guide-catheter",minid:.087,maxod:.112,length:"85 / 95"},{type:"Catheter",name:"Cereglide 71",manufacturer:"Cerenovus",Description:`"The CEREGLIDE™ 71 Intermediate Catheter with TruCourse™ has been meticulously engineered based on stroke science to deliver reliable trackability, durable delivery, and versatility while seamlessly integrating into the CERENOVUS Stroke Solutions™.

# Reliable Trackability
The TruCourse™ Technology provides smoother navigation, allowing the catheter to navigate to the target site with 1:1 responsiveness. It features a 55 cm hydrophilic coating, enhancing its ability to track through tortuous anatomy and facilitating smooth transitions with an angle-cut design.

# Durable Delivery
The catheter offers improved lumen integrity during intra-procedural use. Its angle-cut polymer jacket is specifically designed for smooth transitions, ensuring reliable performance throughout the procedure.

# Constructed for Versatility
Optimized for effective direct aspiration and capable of up to three stent retriever passes, the catheter also boasts a greater thrombus holding force. It is designed to integrate seamlessly into the CERENOVUS Stroke Solutions™, providing end-to-end clot control in conjunction with the EMBOTRAP® III Revascularization Device and the EMBOGUARD™ Balloon Guide Catheter."`,url1:"https://archive.is/20240608115020/https://www.jnjmedtech.com/en-US/product/cereglide-71-with-trucourse",minid:.071,maxod:.0825,length:"115 / 125 / 132"},{type:"Intrasaccular Device",name:"Neqstent 7 mm to 11 mm",manufacturer:"Cerus",image:"neqstent sizing.png",Description:'"Designed to assist with the embolization of intracranial aneurysms focusing on treatment at the neck. Treats a wide range of unruptured aneurysm morphologies including wide-necked bifurcation and bifurcation aneurysms. Adjunctive device providing stable aneurysm neck  coverage for the placement  of embolization coils within sac and long term stable occlusion of the aneurysm. Requires the physician to size only to the aneurysm neck; Smooth and controlled delivery into aneurysm sac; Minimal arterial components and some flow diverting properties to reduce  coil compaction and recurrences; Delivered using established catheterization techniques; Electrolytic method of detachment."',url1:"https://www.cerusendo.com/neqstent-bridging-device",url2:"https://c92319a4-9513-4c41-823f-a299417a6f3a.filesusr.com/ugd/a71523_e2bb5aaf26de4c859324b3cf7059b58d.pdf",minid:0,maxod:.026,sizetable:'[{"Product Code":"NQS21407-15 0.021” 7.0 3.0 - 5.0","Microcatheter":"0.021\\"","Device Diameter (mm)":"7 mm","Aneurysm Neck (mm)":"3-5 mm"},{"Product Code":"NQS21409-15 0.021” 9.0 4.0 - 6.0","Microcatheter":"0.021\\"","Device Diameter (mm)":"9 mm","Aneurysm Neck (mm)":"4-6 mm"},{"Product Code":"NQS21411-15 0.021” 11.0 5.0 - 8.0","Microcatheter":"0.021\\"","Device Diameter (mm)":"11 mm","Aneurysm Neck (mm)":"5-8 mm"},{"Product Code":"NQS414-15 0.027” 14.0 7.0 - 10.0","Microcatheter":"0.027\\"","Device Diameter (mm)":"14 mm","Aneurysm Neck (mm)":"7-10 mm"}]',tablecaption:"Sizes"},{type:"Intrasaccular Device",name:"Neqstent 14 mm",manufacturer:"Cerus",image:"neqstent sizing.png",Description:'"Designed to assist with the embolization of intracranial aneurysms focusing on treatment at the neck. Treats a wide range of unruptured aneurysm morphologies including wide-necked bifurcation and bifurcation aneurysms. Adjunctive device providing stable aneurysm neck  coverage for the placement  of embolization coils within sac and long term stable occlusion of the aneurysm. Requires the physician to size only to the aneurysm neck; Smooth and controlled delivery into aneurysm sac; Minimal arterial components and some flow diverting properties to reduce  coil compaction and recurrences; Delivered using established catheterization techniques; Electrolytic method of detachment."',url1:"https://www.cerusendo.com/neqstent-bridging-device",url2:"https://c92319a4-9513-4c41-823f-a299417a6f3a.filesusr.com/ugd/a71523_e2bb5aaf26de4c859324b3cf7059b58d.pdf",minid:0,maxod:.026,sizetable:'[{"Product Code":"NQS21407-15 0.021” 7.0 3.0 - 5.0","Microcatheter":"0.021\\"","Device Diameter (mm)":"7 mm","Aneurysm Neck (mm)":"3-5 mm"},{"Product Code":"NQS21409-15 0.021” 9.0 4.0 - 6.0","Microcatheter":"0.021\\"","Device Diameter (mm)":"9 mm","Aneurysm Neck (mm)":"4-6 mm"},{"Product Code":"NQS21411-15 0.021” 11.0 5.0 - 8.0","Microcatheter":"0.021\\"","Device Diameter (mm)":"11 mm","Aneurysm Neck (mm)":"5-8 mm"},{"Product Code":"NQS414-15 0.027” 14.0 7.0 - 10.0","Microcatheter":"0.027\\"","Device Diameter (mm)":"14 mm","Aneurysm Neck (mm)":"7-10 mm"}]',tablecaption:"Sizes"},{type:"Intrasaccular Device",name:"Contour 5-7 mm",manufacturer:"Cerus",image:"contour sizing.png",Description:'"Designed to treat a range of aneurysm morphologies including unruptured wide-necked bifurcation and bifurcation aneurysms. Provides a combination of flow diversion at the neck of the aneurysm and flow disruption within the aneurysm sac; Supports neo-intimal growth across mesh at neck and subsequent thrombosis of aneurysm; Deployed with proven existing clinical techniques; A single device occlusion that is re-sheathable & re-deployable; Electrolytic method of detachment; Strong IP portfolio - 3 patents issued and 3 patents pending; No intra-arterial stabilizing component; Reduces/eliminates need for dual anti-platelet therapy; Simplified sizing approach compared to other intra-saccular devices (i.e. neck  and widest diameter only)."',url1:"https://www.cerusendo.com/contour-neurovascular-system",url2:"https://c92319a4-9513-4c41-823f-a299417a6f3a.filesusr.com/ugd/a71523_06535810e1324c67bf0ecab7a619a921.pdf",minid:0,maxod:.02,length:"?",sizetable:'[{"Product code":"CNS21005-15","Microcatheter":"0.021\\"","Diameter (mm)":"5","Aneurysm neck (mm)":"2-3","Aneurysm width (mm)":"2-3.5"},{"Product code":"CNS21007-15","Microcatheter":"0.021\\"","Diameter (mm)":"7","Aneurysm neck (mm)":"3-5","Aneurysm width (mm)":"3-5.5"},{"Product code":"CNS21009-15","Microcatheter":"0.021\\"","Diameter (mm)":"9","Aneurysm neck (mm)":"4-6","Aneurysm width (mm)":"5-7.5"},{"Product code":"CNS011-15","Microcatheter":"0.027\\"","Diameter (mm)":"11","Aneurysm neck (mm)":"5-8","Aneurysm width (mm)":"7-8.5"},{"Product code":"CNS-014-15","Microcatheter":"0.027\\"","Diameter (mm)":"14","Aneurysm neck (mm)":"7-10","Aneurysm width (mm)":"8-10.5"}]',tablecaption:"Sizes",Detachment:"Electrolytic",comments:`<p>PREPARATION:</p>
<p>
Place the microcatheter in the aneurysm sac in the usual fashion. 0.021" or 0.027" microcatheters are used depending on the size of the Contour device chosen (see associated table). Recommended catheters include the Headway (Microvention), XT (Stryker) and Phenom (Medtronic). The Via (Microvention) or Rebar (Medtronic) are probably a bit too stiff for the device. A second microcatheter can be jailed above the contour for coil deployment. 
</p>
<p>
The Contour is prepared first by dipping the tip of the sheath/device in saline and unsheathing by pushing the device out. Resheath under the saline (to stop air bubbles attaching to the device). 
</p>
<p>
Load the device in to the microcatheter by 'hubbing' the Contour and waiting for saline to drip out the end of the sheath. Next, push the pusher wire until the end is fully within the sheath.
Remove the sheath and keep pushing the pusher wire until the device appears on the screen. It is recommended at this point to give a gentle pull on the wire whilst the device is still within the microcatheter to ensure that it has not prematurely detached. If this is the case then remove the microcatheter and pusher wire together and replace the device/microcatheter. 
</p>
<p>
The device is next unsheathed in the aneurysm. Unlike the WEB, the tip is not sharp as it initially unsheaths. The Contour can be fully resheathed and redeployed if necessary. It is said to resemble a red wine glass if it has been suitably sized and a saucer if it is undersized. Probably the most dangerous situation is oversizing, where it resembles a champagne flute. The danger is of focusing a central channel of blood which can result in aneurysm rupture, or of blocking vessels arising from the neck causing ischaemia.  
</p>
<p>
The detachment is electrolytic. The red cable is attached to the device pusher wire. Dampening the wire with a saline soaked gauze is sometimes helpful to improve electrical contact. A black cable is attached to a needle inserted in to the muscles of the thigh. 
</p>`,Resheathable:"Completely resheathable."},{type:"Intrasaccular Device",name:"Contour 9-14 mm",manufacturer:"Cerus",image:"contour sizing.png",Description:'"Designed to treat a range of aneurysm morphologies including unruptured wide-necked bifurcation and bifurcation aneurysms. Provides a combination of flow diversion at the neck of the aneurysm and flow disruption within the aneurysm sac; Supports neo-intimal growth across mesh at neck and subsequent thrombosis of aneurysm; Deployed with proven existing clinical techniques; A single device occlusion that is re-sheathable & re-deployable; Electrolytic method of detachment; Strong IP portfolio - 3 patents issued and 3 patents pending; No intra-arterial stabilizing component; Reduces/eliminates need for dual anti-platelet therapy; Simplified sizing approach compared to other intra-saccular devices (i.e. neck  and widest diameter only)."',url1:"https://www.cerusendo.com/contour-neurovascular-system",url2:"https://c92319a4-9513-4c41-823f-a299417a6f3a.filesusr.com/ugd/a71523_06535810e1324c67bf0ecab7a619a921.pdf",minid:0,maxod:.026,length:"?",sizetable:'[{"Product code":"CNS21005-15","Microcatheter":"0.021\\"","Diameter (mm)":"5","Aneurysm neck (mm)":"2-3","Aneurysm width (mm)":"2-3.5"},{"Product code":"CNS21007-15","Microcatheter":"0.021\\"","Diameter (mm)":"7","Aneurysm neck (mm)":"3-5","Aneurysm width (mm)":"3-5.5"},{"Product code":"CNS21009-15","Microcatheter":"0.021\\"","Diameter (mm)":"9","Aneurysm neck (mm)":"4-6","Aneurysm width (mm)":"5-7.5"},{"Product code":"CNS011-15","Microcatheter":"0.027\\"","Diameter (mm)":"11","Aneurysm neck (mm)":"5-8","Aneurysm width (mm)":"7-8.5"},{"Product code":"CNS-014-15","Microcatheter":"0.027\\"","Diameter (mm)":"14","Aneurysm neck (mm)":"7-10","Aneurysm width (mm)":"8-10.5"}]',tablecaption:"Sizes",Detachment:"Electrolytic",comments:`<p>PREPARATION:</p>

</p>
<p>
The Contour is prepared first by dipping the tip of the sheath/device in saline and unsheathing by pushing the device out. Resheath under the saline (to stop air bubbles attaching to the device). 
</p>
<p>
Load the device in to the microcatheter by 'hubbing' the Contour and waiting for saline to drip out the end of the sheath. Next, push the pusher wire until the end is fully within the sheath.
Remove the sheath and keep pushing the pusher wire until the device appears on the screen. It is recommended at this point to give a gentle pull on the wire whilst the device is still within the microcatheter to ensure that it has not prematurely detached. If this is the case then remove the microcatheter and pusher wire together and replace the device/microcatheter. 
</p>
<p>
The device is next unsheathed in the aneurysm. Unlike the WEB, the tip is not sharp as it initially unsheaths. The Contour can be fully resheathed and redeployed if necessary. It is said to resemble a red wine glass if it has been suitably sized and a saucer if it is undersized. Probably the most dangerous situation is oversizing, where it resembles a champagne flute. The danger is of focusing a central channel of blood which can result in aneurysm rupture, or of blocking vessels arising from the neck causing ischaemia.

<p>NB The naming of long sheaths is slightly confusing. They are named similarly to other sheaths (e.g. groin or radial) - i.e. after their INNER diameter. Hence a "6 french" shuttle is actually 8 french on the outside. Guide catheters, such as the Benchmark, are named after their OUTER diameter. Hence a "6 french" Benchmark is 6 french on the outside. The confusion arises as long sheaths can also be used as conventional guide catheters, i.e. placed within groin sheaths.</p>`},{type:"Microcatheter",name:"Micro Ferret",manufacturer:"Cook Medical",minid:.018,maxod:.039,length:"150"},{type:"Stent",name:"Zilver",manufacturer:"Cook Medical",url1:"https://www.cookmedical.com/products/di_ziv_635_webds/",minid:.019,maxod:.064,length:120},{type:"Stent",name:"Precise Pro RX 5-8 mm diameter Carotid",manufacturer:"Cordis",url1:"https://www.cordis.com/en_us/endovascular/intervene/self-expanding-stents/precise-pro-rx-carotid-stent.html",url2:"https://www.cordis.com/content/dam/cordis/web/documents/catalog/cordis-us-endovascular-catalog.pdf",minid:.016,maxod:.053,length:135},{type:"Stent",name:"Precise Pro RX 9-10 mm diameter Carotid",manufacturer:"Cordis",url1:"https://www.cordis.com/en_us/endovascular/intervene/self-expanding-stents/precise-pro-rx-carotid-stent.html",url2:"https://www.cordis.com/content/dam/cordis/web/documents/catalog/cordis-us-endovascular-catalog.pdf",minid:.016,maxod:.068,length:135},{type:"Stent Retriever",name:"Vesalio NeVa diameter 5.5 mm",manufacturer:"Delta Medical",Description:'"NeVa® is a stent retrieval system that interacts with clots differently and far more effectively than older methods of recovery and recanalisation. It is engineered to capture all clot types including the most challenging fibrin-rich examples. NeVa® has been designed with distinct functional zones which facilitate clot interaction, in order to capture, retain, and retrieve more effectively. This provides higher 1st pass success, better recanalisation rates, reduced time to reca <p>Preparation:</p>
<p>Flush the plastic case ("dispenser coil") containing the Xpedion 10 wire, and the  balloon catheter, with saline to activate the hydrophilic coating. </p>
<p>Prepare a contrast:saline mix in a pot containing 50-70% contrast. Fill up a 3 ml syringe with this mixture. </p>
<p>Attach a 2-way stopcock to an RHV. Attach the 3 ml syringe to the RHV and flush it to remove any air. Tighten the RHV and attach the RHV to the microcatheter. Flush forward the balloon catheter to fully purge the system. </p>
<p>Feed the X-pedion 10 wire in to the  balloon catheter lumen via the RHV but keep it proximal to the distal seal (so that it does not protrude out the end). Flush the system again before and after tightening the RHV. Advance the guidewire until the wire passes distal to the catheter tip. Form a curve on the wire tip if necessary. At this point the wire forms a seal on the balloon. </p>
<p>Using the 3 ml syringe perform a test inflation of the balloon to it's nominal pressure. Inspect the balloon for any abnormalities or air bubbles. If satisfied then deflate the balloon by aspirating with the syringe with the tip submerged within the contrast saline mix. </p>
<p>If air is observed in the balloon then submerge the tip in contrast:saline mix and withdraw the wire inside the balloon catheter again to deflate the balloon. Flush again and then reinsert the wire beyond the tip. Perform another test inflation. </p>
<p>Replace the 3 ml syringe with a 1 ml syringe filled with the same contrast:saline mixture. This will be used to inflate the catheter in the body. Insert the balloon catheter in to the guide catheter. </p>
<p>Ensure not to pull the wire tip beyond the balloon catheter distal tip after preparation as this risks air or blood to enter the  system. </p>`,"tip lengths":"2 mm"},{type:"Balloon",name:"HyperForm 4 mm",manufacturer:"Medtronic",image:"hyper.png",Description:'"HyperForm™ Occlusion Balloons are designed  with extra softness to  conform to asymmetrical, irregular,  and,  complex  vasculature  geometries like none other."',url1:"https://web.archive.org/web/20210405011659/http://www.forecastscience.com/download/forecastscience_com/HyperForm%20brochure.pdf",url2:"https://www.medtronic.com/content/dam/medtronic-com/products/neurological/neurovascular-product-catalog.pdf",dmso:"yes",minid:.011,maxod:.036,length:"150",Sizes:"7 mm, 15 mm, and 20 mm balloon lengths",comments:`<p>Single lumen balloon. Packaged with an X-Pedion™ 0.010" hydrophilic guidewire. </p>

<p>PRIME SOFT and EXTRA SOFT:
Soft and extra soft have random coil break designed to deflect when it encounters resistance and seek out open spaces. 

Soft coil comes in 3D and Helix configurations. The diameters for both of these vary from 4-6 mm and lengths 6-20 cm. The outer diameter is 0.0115. The volume filled ranges from 4.02 mm cubed to 13.4 mm cubed. Whilst helical coils are good at finding space if prolapse is an issue (for example during the first few coils) 3D might be a better option. 

Extra Soft also comes in 3D and Helix configurations. The diameters for 3D varies from 1-3.5 mm and lengths 2-10 cm. The outer diameter is 0.0108" and volume varies between 1.18 to 5.9 mm cubed. The diameters for Helix varies between 1-3 mm and lengths 1-10 cm. The outer diameter is 0.0108" and volume varies between 0.59 to 5.9 mm cubed. 
</p><p>
MICROFX:
Contains PGLA/nylon microfilaments designed to accelerate thrombosis. Has "LatticeFX technology" which provides a scaffold designed to enhance cell adhesion and extracellular deposition. Comes in 3D and Helix configurations.

</p>
<p>

U.S. Indications

The Mo.Ma™ Ultra proximal cerebral protection device is indicated as an embolic protection system to contain and remove embolic material (thrombus/debris) while performing angioplasty and stenting procedures involving lesions of the internal carotid artery and/or the carotid bifurcation.

The reference diameter of the external carotid artery should be between 3-6 mm and the reference diameter of the common carotid artery should be between 5-13 mm.
</p>
<p>
Double-Occlusion Balloon System:

    Utilizes highly compliant, elastomeric balloons that provide atraumatic flow suspension and stability.

Guide-catheter technology:

    Provides excellent trackability, support and stability for ease of lesion crossing and accurate stent deployment.

Working channel exit port distal to CCA balloon:

    Provides lesion access and effective, efficient aspiration of debris.

Radiopaque markers:

    Markers are centrally located in each balloon for precise positioning and orientation.

Optimal device selection:

    Mo.Ma Ultra device allows for selection of preferred wires, stents and balloons during intervention.

High-capture efficiency:

    Device facilitates the removal of all sizes of debris through aspiration."</p>`,url1:"https://web.archive.org/web/20210116144904/https://www.medtronic.com/us-en/healthcare-professionals/products/cardiovascular/embolic-protection-devices/mo-ma.html",url2:"https://www.medtronic.com/us-en/healthcare-professionals/products/cardiovascular/embolic-protection-devices/mo-ma.html",minid:.083,maxod:.1181102,length:95,youtube:"https://www.youtube.com/embed/-T-SoiPiDdY"},{type:"Catheter",name:"RIST 071",manufacturer:"Medtronic",Description:`"Rist™ Radial Access system is the first portfolio designed for the

on system, these catheters are designed to revascularize patients experiencing acute ischemic stroke."',url1:"https://www.medtronic.com/us-en/healthcare-professionals/products/neurological/revascularization-stroke/react-catheters.html",url2:"https://www.medtronic.com/content/dam/medtronic-com/products/neurological/neurovascular-product-catalog.pdf",minid:.068,maxod:.083,length:"132",comments:"The React 68 aspiration catheter is distally lined with PTFE."},{type:"Catheter",name:"REACT 71",manufacturer:"Medtronic",Description:'"The React™ 68 catheter and the React™ 71 catheter feature a coil and braid design along with end-to-end nitinol construction — easing navigation to the M1 and M2 segments. Combined with the Riptide™ aspiration system, these catheters are designed to revascularize patients experiencing acute ischemic stroke."',url1:"https://www.medtronic.com/us-en/healthcare-professionals/products/neurological/revascularization-stroke/react-catheters.html",minid:.071,maxod:.0855,length:"132",comments:"The React 71 aspiration catheter is distally lined with TPE. It has variable braid construction with 16 wires in each braid. There is some experimental ex-vivo evidence that the high distensibility of the React's tip improves the aspiration ability of the device when retrieving stiffs clot larger than the device inner diameter. (Li J, Castaño O, Tomasello A, de Dios Lascuevas M, Canals P, Engel E, Ribo M. Catheter tip distensibility substantially influences the aspiration force of thrombectomy devices. J Neurointerv Surg. 2021 Apr 15:neurintsurg-2021-017487. doi: 10.1136/neurintsurg-2021-017487)."},{type:"Liquid Embolic",name:"Onyx",manufacturer:"Medtronic",Description:'"Onyx® is a non-adhesive liquid embolic agent comprised of EVOH (ethylene vinyl alcohol) copolymerdissolved in DMSO (dimethyl sulfoxide), and suspended micronized tantalum powder to provide contrast for visualization under fluoroscopy. The Onyx Liquid Embolic System (LESTM) consists of a 1.5 ml vial of Onyx, a 1.5 ml vial of DMSO, and three 1 ml Onyx delivery syringes. A DMSO compatible delivery microcatheter that is indicated for use in the neuro vasculature (e.g. MarathonTM, RebarTM or UltraFlowTM HPC catheters) is used to access the embolization site. Onyx is available in two product formulations, Onyx 18(6% EVOH) and Onyx 34 (8% EVOH). Onyx 18 will travel more distally and penetrate deeper into the nidus due to its lower viscosity compared to Onyx 34. Final solidification occurs within five minutes for both product formulations. Onyx is delivered by slow controlled injection through a micro catheter into the brain arteriovenous malformation under fluoroscopic control. The DMSO solvent dissipates into the blood, causing the EVOH copolymer and suspended tantalum to precipitate in situ into a spongy, coherent embolus. Onyx immediately forms a skin as the polymeric embolus solidifies from the outside to the inside, while traveling more distally in the lesion."',url1:"https://www.medtronic.com/us-en/healthcare-professionals/products/neurological/avm-embolization/onyx-liquid-embolic.html",url2:"https://www.medtronic.com/us-en/healthcare-professionals/products/neurological/avm-embolization/onyx-liquid-embolic/indications-safety-warnings.html",ifu:"https://www.accessdata.fda.gov/cdrh_docs/pdf6/H060003c.pdf",minid:0,maxod:.00903,length:"?",material:"Ethylene vinyl alcohol (EVOH) copolymer dissolved in DMSO (dimethyl sulfoxide) and suspended micronised tantalum powder",Strengths:"18 (6% EVOH, low viscosity) and 34 (8% EVOH, high viscosity)",Preparation:"Shaking is required (approximately 15-20 minutes)","CT artefacts":"High (due to tantalum)",Cautions:"DMSO may cause necrotising endotheliitis within the injected vessel (so slow and controlled injection necessary). Relatively contraindicated in infants and pregnancy.",features:'"EFFICACY: Cohesive deposition and delivery. SIMPLICITY: A slow controlled injection and delivery method. Ability to stop and start the injec ccess-delivery-nv/mirage.html",ifu:"https://europe.medtronic.com/xd-en/healthcare-professionals/products/neurological/access-delivery-nv/mirage/indications-safety-warnings.html",minid:0,maxod:.012,length:200},{type:"Wire",name:"X-pedion",manufacturer:"Medtronic",url1:"https://www.medtronic.com/content/dam/medtronic-com/products/neurological/neurovascular-product-catalog.pdf",minid:0,maxod:.012,length:200},{type:"Wire",name:"Silverspeed 010",manufacturer:"Medtronic",url1:"https://www.medtronic.com/content/dam/medtronic-com/products/neurological/neurovascular-product-catalog.pdf",minid:0,maxod:.01,length:200},{type:"Wire",name:"Silverspeed 014",manufacturer:"Medtronic",url1:"https://www.medtronic.com/content/dam/medtronic-com/products/neurological/neurovascular-product-catalog.pdf",minid:0,maxod:.014,length:"175 / 200"},{type:"Stent",name:"Tubridge Vascular Reconstruction Device",manufacturer:"Microport",image:"scepter.png",Description:'"Tubridge® is the first intracranial flow diverter designed and developed in China. It is indicated specifically to the most fatal large(>20mm)or giant(>25mm) aneurysms. The device can effectively divert the blood flow of the parent arteryby hemodynamic mechanisms, reduce the impact of the blood flow to the cerebral aneurysm, and promote the endothelialization process at the aneurysm neck. This promotes healing of the aneusysm."',url1:"https://www.microport.com/en/healthcare-professional/neurovascular/hemorrhagic-stroke",minid:0,maxod:.028,length:"?",material:"Nickel-titanium alloy, platinum, iridium",design:"46 braided nitinol wires and two platinum strands for smaller versions (2.5–3mm), whereas 62 nitinol wires and two platinum strands  constitute  larger  versions  (3.5–6.5mm). Pore size of 0.040–0.050 mm2 at the nominal diameter to provide high metal coverage (approximately 30.0%–35.0%) at the aneurysmal neck after full opening"},{type:"Balloon",name:"Scepter C 4 mm",manufacturer:"MicroVention",image:"scepter.png",Description:'"The Scepter balloon offers versatility with clinical applications in four key areas: Balloon Remodeling, Stent Delivery, Liquid Embolic Injection, and Balloon-Test Occlusion"',url1:"https://www.microvention.com/product/scepter",dmso:"yes",minid:.0165,maxod:.037,length:"150",sizetable:'[{"Product Name":"Scepter C","Product Code":"BC0410C","Nominal Balloon Diameter":"4.0mm","Working Balloon Range":"2.0-5.0mm","Balloon Length":"10mm","Tip Length":"5mm","Catheter Working Length":"150cm","Inflation Lumen Dead Volume":"0.40cc","Balloon Inflation Volume (Nominal)":"0.16cc","Proximal Shaft OD":"2.8F","Distal Tip OD":"2.1F","Inner Lumen Diameter":"0.0165 in"},{"Product Name":"Scepter C","Product Code":"BC0415C","Nominal Balloon Diameter":"4.0mm","Working Balloon Range":"2.0-5.0mm","Balloon Length":"15mm","Tip Length":"5mm","Catheter Working Length":"150cm","Inflation Lumen Dead Volume":"0.40cc","Balloon Inflation Volume (Nominal)":"0.18cc","Proximal Shaft OD":"2.8F","Distal Tip OD":"2.1F","Inner Lumen Diameter":"0.0165 in"},{"Product Name":"Scepter C","Product Code":"BC0420C","Nominal Balloon Diameter":"4.0mm","Working Balloon Range":"2.0-5.0mm","Balloon Length":"20mm","Tip Length":"5mm","Catheter Working Length":"150cm","Inflation Lumen Dead Volume":"0.40cc","Balloon Inflation Volume (Nominal)":"0.22cc","Proximal Shaft OD":"2.8F","Distal Tip OD":"2.1F","Inner Lumen Diameter":"0.0165 in"},{"Product Name":"Scepter XC","Product Code":"BC0411XC","Nominal Balloon Diameter":"4.0mm","Working Balloon Range":"2.0-6.0mm","Balloon Length":"11mm","Tip Length":"5mm","Catheter Working Length":"150cm","Inflation Lumen Dead Volume":"0.40cc","Balloon Inflation Volume (Nominal)":"0.10cc","Proximal Shaft OD":"2.8F","Distal Tip OD":"2.1F","Inner Lumen Diameter":"0.0165 in"}]',tablecaption:"Available sizes",comments:`<p>NB: C means Compliant and "XC" means eXtra Compliant (I think they should just use acronyms properly and call it EC).</p>
<p>

There are multiple ways to prepare the Scepter balloon. I would recommend the following:
</p>

<p>
Prepare a contrast/saline mix in a small pot. Concentrations vary but 70% contrast and 30% saline gives good visibility. There should be no less than 50% contrast. Draw up some contrast/saline in a 5 ml syringe.

First attach a blunt needle (such as the one typically used to draw up local anaesthesia) to the syringe and stick the tip in the inflation port (the one on the side). Fill the balloon hub with contrast/saline mix from deep to superficial to avoid creating any bubbles. 

</p>

<p>
 
Next remove the needle and attach the syringe directly to the inflation port. 

Hold the balloon tip vertically and VERY SLOWLY inject the syringe. You will first probably see the balloon inflate with air first and then a fluid level will appear and the air will be expelled and the balloon will fill with contrast/saline. It is important to hold the balloon vertically so that they will float to the top and get expelled from the tip. Sometimes there is no air in the balloon, it just inflates with liquid. Fully inflate the balloon. Inflating the balloon very slowly helps avoid creating bubbles for some reason. 

</p>

<p>
Next place and hold the balloon tip within the contrast/saline mix and aspirate to empty the balloon. Be careful not to introduce any air in to it by keeping the tip in the liquid and not exposed to the air. 

</p>

<p>
Remove the balloon tip from the liquid. Fill a 1 ml syringe to about two-thirds full with the contrast/saline mix and attach a 1-way valve to it. Attach this to the ballon hub (already filled with contrast/saline) being careful not to introduce any air bubbles by injecting fluid out as you touch them. 
</p>

<p>
Attach a rotating haemostatic valve to a flush bag and flush it in the normal way. Attach this to the second non-inflation port and flush the catheter lumen. Insert the microwire in to the balloon catheter until the tip protrudes out the end. Shape the tip of the microwire and then withdraw it back in to the tip. 

</p>

<p>
Note: you can do all this with just one syringe rather than 2, I just find it less fiddly. </p>`},{type:"Balloon",name:"Scepter XC 4 mm",manufacturer:"MicroVention",image:"scepter.png",Description:'"The Scepter balloon offers versatility with clinical applications in four key areas: Balloon Remodeling, Stent Delivery, Liquid Embolic Injection, and Balloon-Test Occlusion"',url1:"https://www.microvention.com/product/scepter",dmso:"yes",minid:.0165,maxod:.037,length:"150",sizetable:'[{"Product Name":"Scepter C","Product Code":"BC0410C","Nominal Balloon Diameter":"4.0mm","Working Balloon Range":"2.0-5.0mm","Balloon Length":"10mm","Tip Length":"5mm","Catheter Working Length":"150cm","Inflation Lumen Dead Volume":"0.40cc","Balloon Inflation Volume (Nominal)":"0.16cc","Proximal Shaft OD":"2.8F","Distal Tip OD":"2.1F","Inner Lumen Diameter":"0.0165 in"},{"Product Name":"Scepter C","Product Code":"BC0415C","Nominal Balloon Diameter":"4.0mm","Working Balloon Range":"2.0-5.0mm","Balloon Length":"15mm","Tip Length":"5mm","Catheter Working Length":"150cm","Inflation Lumen Dead Volume":"0.40cc","Balloon Inflation Volume (Nominal)":"0.18cc","Proximal Shaft OD":"2.8F","Distal Tip OD":"2.1F","Inner Lumen Diameter":"0.0165 in"},{"Product Name":"Scepter C","Product Code":"BC0420C","Nominal Balloon Diameter":"4.0mm","Working Balloon Range":"2.0-5.0mm","Balloon Length":"20mm","Tip Length":"5mm","Catheter Working Length":"150cm","Inflation Lumen Dead Volume":"0.40cc","Balloon Inflation Volume (Nominal)":"0.22cc","Proximal Shaft OD":"2.8F","Distal Tip OD":"2.1F","Inner Lumen Diameter":"0.0165 in"},{"Product Name":"Scepter XC","Product Code":"BC0411XC","Nominal Balloon Diameter":"4.0mm","Working Balloon Range":"2.0-6.0mm","Balloon Length":"11mm","Tip Length":"5mm","Catheter Working Length":"150cm","Inflation Lumen Dead Volume":"0.40cc","Balloon Inflation Volume (Nominal)":"0.10cc","Proximal Shaft OD":"2.8F","Distal Tip OD":"2.1F","Inner Lumen Diameter":"0.0165 in"}]',tablecaption:"Availabl </p>

Note: you can do all this with just one syringe rather than 2, I just find it less fiddly. </p>`},{type:"Balloon",name:"Scepter Mini",manufacturer:"Microvention",Description:'"The Scepter Mini has similar indications for use as the predicates, however, incorporates several minor design differences.  The Scepter Mini has a slightly longer length and a slightly smaller diameter.  The balloon of the Scepter Mini is slightly shorter.  The distal tip of the Scepter Mini extends a shorter distance from the distal end of the balloon than that of the Scepter C and XC.  For the Scepter Mini, the purge hole is covered by a semi-permeable  membrane  designed  to  allow  air  to  escape  while  preventing  liquids  from  passing.    The predicate  Scepter  C  and  XC  incorporate  3  radiopaque  marker  bands,  while  the  design  of  the  Scepter  Mini  allows  for  visualization  under  fluoroscopy  with  only  2  radiopaque  marker  bands  (due  to  shorter  distal  tip  segment).  All Scepter catheters have a hydrophilic coating."',url1:"https://www.accessdata.fda.gov/cdrh_docs/pdf18/K182829.pdf",dmso:"yes",minid:.009,maxod:.03675,length:165,comments:`- Length: 156 cm
- Distal Outer Diameter (OD): 1.6 Fr
- Distal Inner Diameter (ID): 0.010 in
- Nominal Balloon Diameter: 2.2 mm x 9 mm
- Maximal Balloon Diameter: 2.7 mm
- Nominal Balloon Inflation Volume: 0.02 cc
- Maximal Balloon Inflation Volume: 0.04 cc
- Working Length: 165 cm
- Air Purge: Purge hole covered by semi-permeable membrane
- Guidewire Compatibility: 0.008 in or smaller
- Catheter Dead Space: 0.44 mL`,"tip lengths":"9 mm",material:"Polyurethrane elastomeric. Hydrophilic coating.",design:"Dual coaxial lumen",Preparation:`<ol>
  <li>Fully hydrate the balloon through the dispenser tube with saline using a syringe attached to the flush port for approximately 30 seconds (balloon coating may crack if the balloon is inflated without proper hydration).</li>
  <li>Remove balloon microcatheter from the dispenser tube and remove the stylet wire from the guidewire lumen.</li>
  <li>Attach a rotating hemostatic valve (RHV) to the guidewire lumen and flush the guidewire lumen with saline using a 10 cc syringe.</li>
  <li>Introduce a hydrated 0.008 in or smaller guidewire into the guidewire lumen of the balloon catheter.</li>
  <li>Fill a 1 cc syringe halfway (0.5 cc) with 100% contrast solution, attach to a one-way stopcock, and carefully purge the air.</li>
  <li>Attach the 1 cc syringe and stopcock to the inflation port at the proximal hub of the balloon microcatheter without injecting contrast into the hub. Ensure there are no bubbles in the syringe or stopcock prior to attaching.</li>
  <li>Hold the attached 1 cc syringe upright (pointing up). With the other hand, hold the balloon microcatheter proximally and point the balloon upright (pointing up).</li>
  <li>Slowly inflate the balloon by pushing on the plunger of the 1 cc syringe. If the balloon is initially inflated with air, maintain constant syringe pressure. Do not fully inflate balloon with air. Maintain balloon inflation below distal balloon marker band until contrast solution fills inside the balloon. Maintain pressure and do not tilt the balloon until the contrast reaches the distal purge hole and the air has been completely purged.</li>
  <li>Once the balloon has been fully inflated with contrast, inspect balloon for any damages and bubbles. Place catheter tip in saline bowl, then deflate the balloon. Do not deflate the balloon in the air, because this can pull air back into the balloon (self-sealing membrane is gas permeable).</li>
  <li>Remove the 1 cc syringe. Prime the 0.25 cc syringe and stopcock with 100% contrast so that the syringe is filled with approximately 0.10 cc and attach to the primed inflation port.</li>
  <li>Perform final balloon inspection: Re-inflate balloon to nominal volume (0.02 cc), inspect for any contrast leakage from air purge hole, and then deflate while submerged in saline. Turn the stopcock into the closed position. The Scepter Mini is now ready to use.</li>
  <li>Set up a continuous saline flush line and connect it to the sidearm of the RHV. Introduce the balloon catheter/guidewire into the guide catheter using the introducer sheath. Advance to the distal tip of the guide catheter. Then, remove the introducer from the balloon catheter shaft by retracting the introducer from the RHV and peeling off the introducer.</li>
  <li>Advance the balloon catheter and guidewire to the desired location using fluoroscopic visualization.</li>
  <li>To inflate the balloon, turn the stopcock to the open position and slowly inflate the balloon with the 0.25 cc inflation syringe under fluoroscopy (nominal balloon inflation volume is 0.02 cc).</li>
  <li>To lock the balloon in the inflated position, turn the stopcock to the closed position after balloon inflation.</li>
  <li>Remove the guidewire, and proceed with liquid embolic embolization.</li>
  <li>At the conclusion of the embolization, turn the stopcock to the open position and deflate the balloon by gently pulling back on the 0.25 cc syringe. Balloon deflation time with 100% contrast is less than 15 seconds. After balloon deflation, turn the stopcock to the locked position. The Scepter Mini can then be removed by carefully withdrawing it into the guide catheter.</li>

The BOBBY Balloon Guide Catheter is a co-axial, braid-reinforced, variable stiffness catheter with an external hydrophilic coating. The BOBBY Balloon Guide Catheter incorporates a compliant balloon, radiopaque markers, and a bifurcated luer hub on the proximal end. The BOBBY Balloon Guide Catheter has an inner lumen through which a guidewire and catheter can be inserted, and a co-axial outer lumen that is used to inflate and deflate the balloon with a syringe filled with contrast media. A bifurcated luer hub is attached to the proximal end of the balloon guide catheter to provide access to both the inner and outer lumens. In addition, a hydrophilic coating is applied to the distal end of the balloon guide catheter to provide a lubricious outer surface for catheter advancement in the vasculature. A compliant balloon is mounted on the distal end to provide temporary vascular occlusion during angiographic procedures. The balloon incorporates a distal air-purging system to purge air from the inflation lumen prior to use. The balloon catheter also incorporates radiopaque markers to facilitate fluoroscopic visualization and indication of the balloon position."`,url1:"https://www.accessdata.fda.gov/cdrh_docs/pdf19/K193607.pdf",minid:.086,maxod:.11,length:95,material:"Medical grade plastic and stainless steel braid and coil reinforced shaft. The balloon is made of polyurethane. The distal tip has a hydrophilic Coating.",features:"There are 2 distal Pt-IR radiopaque marker bands. The device is supplied with a peel away sheath."},{type:"Stent Retriever",name:"ERIC",manufacturer:"Microvention",image:"eric.png",Description:'"The ERIC device is a clot retrieval device designed to work in conjunction with the SOFIA and SOFIA Plus Catheters. The ERIC device requires no wait time to integrate with the clot and may be retrieved immediately after deployment, potentially resulting in faster procedures."',url1:"https://www.microvention.com/emea/product/eric",minid:0,maxod:.0165,length:205,sizetable:'[{"Product":"ERIC 3x20","Product Code":"ER173020","Diameter":"3mm","Working Length":"20mm","Number of Spheres":"4","Distal Tip Length":"5.0mm","Minimum Catheter ID":"0.017\\"","Pusher Length":"203cm","Recommended Vessel Location":"Distal M2/M3"},{"Product":"ERIC 4x24","Product Code":"ER174024","Diameter":"4mm","Working Length":"24mm","Number of Spheres":"4","Distal Tip Length":"5.0mm","Minimum Catheter ID":"0.017\\"","Pusher Length":"203cm","Recommended Vessel Location":"M1/M2"},{"Product":"ERIC 4x30","Product Code":"ER174030","Diameter":"4mm","Working Length":"30mm","Number of Spheres":"5","Distal Tip Length":"5.0mm","Minimum Catheter ID":"0.017\\"","Pusher Length":"203cm","Recommended Vessel Location":"M1/M2"},{"Product":"ERIC 6x35","Product Code":"ER176035","Diameter":"6mm","Working Length":"35mm","Number of Spheres":"4","Distal Tip Length":"5.0mm","Minimum Catheter ID":"0.017\\"","Pusher Length":"203cm","Recommended Vessel Location":"Proximal M1/ICA"},{"Product":"ERIC 6x44","Product Code":"ER176044","Diameter":"6mm","Working Length":"44mm","Number of Spheres":"5","Distal Tip Length":"5.0mm","Minimum Catheter ID":"0.017\\"","Pusher Length":"203cm","Recommended Vessel Location":"Proximal M1/ICA"}]',tablecaption:"Catalogue",recommended:"Headway 17, 21, and 27",features:`"Immediate clot integration: The ERIC device’s high amount of ‘intralumenal clot capture surface’ eliminates the need to wait before retrieving the clot, potentially resulting in faster procedure times.

Designed to work with the Sofia and Sofia Plus catheters: The ERIC device is specifically designed to work with the SOFIA and SOFIA Plus catheters, acting as a conveyor belt to help retrieve clot into the powerful aspiration force at the distal tip of the SOFIA or SOFIA Plus catheter."`},{type:"Coil",name:"PC400",manufacturer:"Penumbra",Description:'"The Penumbra Coil 400™ (PC400™) is a large-volume platinum coil. With its larger .020″ (.508 mm) diameter, PC400 is designed to enable higher packing densities using fewer coils, leading to potential efficiencies in procedure duration, time under fluoroscopy, and treatment cost."',url1:"https://www.penumbrainc.com/neuro-device/pc-400/",minid:0,maxod:.02,maxod_cat:.024,length:"?",Sizes:"2 mm to 32 mm in diameter and 1 cm to 60 cm in length",Detachment:"Mechanical",recommended:"px slim",features:'"Offering includes multiple shapes and softness levels: Complex Standard, Complex Soft, Complex Extra Soft, Curve Extra Soft. Ultra HD Fiber for stretch resistance. 3x stronger and 3x more flexible than conventional polypropylene."'},{type:"Coil",name:"Smart Coil",manufacturer:"Penumbra",Description:'"The Penumbra SMART COIL® System is comprised of complex and WAVE™ coils designed for framing, filling, and finishing. These coils have varying levels of softness designed to simplify complex cases. All coils within the Penumbra SMART COIL System are built with Ultra HD Fiber which is designed to be 3x stronger and 3x more flexible than polypropylene. Penumbra SMART COIL also features an instant, single-click mechanical detachment system for ease of use and reliability. The Penumbra SMART COIL System is used to treat a wide range of neurovascular lesions, including small, medium, and large-sized aneurysms."',url1:"https://www.penumbrainc.com/neuro-device/penumbra-smart-coil/",minid:0,maxod:.016,length:"?",Sizes:"1 – 18 mm in diameter and 1 – 60 cm in length",Detachment:"Mechanical",features:'"Offering includes multiple shape and softness levels: Plus Standard, Standard, Soft, Extra Soft, WAVE Extra Soft. Ultra HD Fiber for stretch resistance. 3x stronger and 3x more flexible than polypropylene."'},{type:"Catheter",name:"Neuron Max 088",manufacturer:"Penumbra",Description:'"Neuron MAX 088 is designed to deliver a wide range of devices during neurovascular procedures."',url1:"https://www.penumbrainc.com/it/neuro-device/neuron-system/",minid:.088,maxod:.112,minid_empirical:.088,length:"80 / 90",comments:'The Neuron Max is a "workhorse" general purpose long sheath/catheter. It is useful when a support and a wide inner diameter is required. The tip is relatively stiff compared to more modern catheters, and so usually it is  left in a straight segment of the internal carotid (or below) and not taken inside the skull to avoid vessel dissection. It is not commonly used via a radially approach as the catheter may kink.',features:'"6 F (2.03 mm) long sheath. 0.088" (2.24 mm) lumen allows for a wide range of device compatibility. Proximal shaft engineered for support throughout aortic arch. Soft, atraumatic tip for distal placement. Full distal shaft radiopacity for visualisation throughout procedure. Compatible with Penumbra 6 F (2.03 mm) Select Catheters."'},{type:"Catheter",name:"Neuron 053",manufacturer:"Penumbra",url1:"https://www.penumbrainc.com/neuro-device/neuron-system/",minid:.054,maxod:.08,length:"125 / 136"},{type:"Catheter",name:"Neuron 070",manufacturer:"Penumbra",url1:"https://www.penumbrainc.com/neuro-device/neuron-system/",minid:.07,maxod:.08,length:"95 / 105"},{type:"Catheter",name:"Benchmark 071",manufacturer:"Penumbra",Description:'"The BENCHMARK™ 071 Intracranial Access System combines Penumbra’s innovative tracking technology with its original Neuron® intracranial access concept. The result is a next-generation 6 F (2.03 mm) guide catheter built for delivery of today’s most complex therapies. Enables Rapid Primary Access when utilized with the 5 F (1.65 mm) Select Catheter."',url1:"https://www.penumbrainc.com/neuro-device/benchmark/",minid:.071,maxod:.079,length:"95 / 105 / 115",comments:'The Benchmark is a "workhorse" general purpose catheter. It can be used with a 6-French groin sheath. It can be used without a sheath via a radial approach. It has a very flexible distal segment that may be taken intracranially, obviating the need for intermediate catheters. It does not provide as much proximal support as catheters such as the Neuron Max or Shuttle, however, and it is of a narrower internal diameter.',incompatibility:"Navien 058"},{type:"Catheter",name:"ACE 64",manufacturer:"Penumbra",url1:"https://www.penumbrainc.com/wp-content/uploads/2016/12/10667A_ACE68_Science-of-Aspiration_Brochure_USA.pdf",minid:.064,maxod:.08,length:"132"},{type:"Catheter",name:"BMX 96",manufacturer:"Penumbra",Description:'"The BENCHMARK BMX96 Access System is designed for today’s most complex neurovascular interventions. The advanced stainless steel hypotube technology of BENCHMARK BMX96 provides distal deliverability and proximal stability for most complex therapies. Furthermore, the catheter’s 0.096″ lumen is designed to increase procedural versatility and intraprocedural visualization."',url1:"https://www.penumbrainc.com/neuro-device/benchmark-bmx96-access-system/",minid:.096,maxod:.109,length:"80 / 90 / 100",features:'"8 F OD (2.77 mm) delivery catheter. 096" (2.4 mm) ID expands procedural versatility and intraprocedural visualizationSoft, atraumatic tip for distal placement. Mechanically optimized proximal shaft designed to maximize procedural stability. Prepackaged options with Penumbra 6 F Select Catheters for Rapid Primary Access. Packaged with a dilator designed to provide seamless dilator-to-catheter transition (.038″ guidewire compatible). Tip Shapes: Straight, MP."'},{type:"Catheter",name:"Benchmark BMX 81",manufacturer:"Penumbra",Description:`"The BENCHMARK BMX81 Access System is designed for today’s most 
complex neurovascular interventions. It is a 7 F guide for both femoral 
and radial access. The advanced stainless steel hypotube technology of 
BENCHMARK BMX81 provides distal deliverability and proximal stability 
for most complex therapies. Furthermore, the catheter’s .081″ lumen is 
designed to expand intraprocedural options and compatibility."`,url1:"https://www.penumbrainc.com/benchmark-bmx-81/",url2:"https://www.accessdata.fda.gov/cdrh_docs/pdf22/K221822.pdf",minid:.081,maxod:.092,length:"95 / 105 / 105",comments:'The Benchmark BMX 81 guide catheter is a 7 French (F) outer diameter (OD) delivery catheter, featuring a .081" inner diameter (ID) that expands intraprocedural options and compatibility compared to 6 F guide catheters. It is equipped with a soft, atraumatic tip design for precise distal placement and a mechanically optimized proximal shaft that maximizes procedural stability. The catheter is fully compatible with the Penumbra 5 F (1.65 mm) Select Catheter, which is specifically designed for rapid primary access, optimizing the delivery to the final position and eliminating the need for an over-the-wire exchange. It is conveniently packaged with a dilator that ensures a seamless transition from the dilator to the catheter, enabling smooth and efficient catheterization. The catheter is compatible with a .038" guidewire and offers tip shapes including straight and MP (multipurpose). It is available in lengths of 95 cm, 105 cm, and 115 cm.',incompatibility:"Select 6 F"},{type:"Catheter",name:"3MAX DDC",manufacturer:"Penumbra",url1:"https://www.penumbrainc.com/neuro-device/max-reperfusion-catheters/",minid:.035,maxod:.062,length:153},{type:"Catheter",name:"4MAX DDC",manufacturer:"Penumbra",url1:"https://www.penumbrainc.com/neuro-device/max-reperfusion-catheters/",minid:.041,maxod:.08,length:130,incompatibility:"Eclipse 2L"},{type:"Catheter",name:"5MAX DDC",manufacturer:"Penumbra",url1:"https://www.penumbrainc.com/neuro-device/max-reperfusion-catheters/",minid:.054,maxod:.08,length:"115 / 125"},{type:"Catheter",name:"Jet 7 Reperfusion Catheter",manufacturer:"Penumbra",Description:'"The Penumbra JET® 7 Reperfusion Catheter is intended for use in the revascularization of patients with acute ischemic stroke secondary to large vessel occlusion. The larger lumen of Penumbra JET 7, powered by Penumbra ENGINE®, is designed to increase thrombus removal force. The Penumbra JET 7 allows for the combined use with the 3D Revascularization Device™, which offers four intraluminal chambers designed to lock clot, along with outer petals to trap clot for maximum thrombus extraction."',url1:"https://www.penumbrainc.com/neuro-device/penumbra-jet-7/",minid:.072,maxod:.085,length:"132"},{type:"Catheter",name:"Jet D Reperfusion Catheter",manufacturer:"Penumbra",Description:'"The Penumbra JET™ D Reperfusion Catheter is intended for use in the revascularization of patients with acute ischemic stroke secondary to large vessel occlusion. The Penumbra JET D is designed to navigate smaller, distal vessels and extract clot efficiently with the power of the Penumbra ENGINE™ aspiration source."',url1:"https://www.penumbrainc.com/neuro-device/penumbra-jet-d/",minid:.054,maxod:.08,length:"138"},{type:"Catheter",name:"ACE 68",manufacturer:"Penumbra",Description:'"Penumbra’s ACE Reperfusion Catheters (ACE68 and ACE60) are intended for use in the revascularization of patients with acute ischemic stroke secondary to large vessel occlusion. The ACE catheter design further increases the distal and proximal lumen sizes, providing optimal trackability and even greater aspiration power. ACE68 is designed to easily navigate tortuous vessels to facilitate extraction of clot quickly and reliably through its large .068″ (1.73 mm) inner lumen with the deep vacuum power of the Penumbra ENGINE™ aspiration source."',url1:"https://www.penumbrainc.com/neuro-device/ace-reperfusion-catheters/",minid:.068,maxod:.08,length:"132"},{type:"Catheter",name:"ACE 60",manufacturer:"Penumbra",Description:'"Penumbra’s ACE Reperfusion Catheters (ACE68 and ACE60) are intended for use in the revascularization of patients with acute ischemic stroke secondary to large vessel occlusion. The ACE catheter design further increases the distal and proximal lumen sizes, providing optimal trackability and even greater aspiration power. ACE68 is designed to easily navigate tortuous vessels to facilitate extraction of clot quickly and reliably through its large .068″ (1.73 mm) inner lumen with the deep vacuum power of the Penumbra ENGINE™ aspiration source."',url1:"https://www.penumbrainc.com/neuro-device/ace-reperfusion-catheters/",minid:.06,maxod:.08,length:"132"},{type:"Microcatheter",name:"PX Slim",manufacturer:"Penumbra",url1:"https://www.penumbrainc.com/neuro-device/px-slim/",minid:.025,maxod:.039,length:"150"},{type:"Microcatheter",name:"Velocity",manufacturer:"Penumbra",url1:"https://www.penumbrainc.com/neuro-device/velocity-delivery-microcatheter/",minid:.025,maxod:.0387,length:"160"},{type:"Microcatheter",name:"Lantern 025",manufacturer:"Penumbra",url1:"https://www.penumbrainc.com/peripheral-device/lantern/",minid:.025,maxod:.0387,length:"115 / 135 / 150"},{type:"Select Catheter",name:"Select 5 F",manufacturer:"Penumbra",url1:"https://www.penumbrainc.com/neuro-device/neuron-system/",minid:.04,maxod:.0656168},{type:"Select Catheter",name:"Select 6 F",manufacturer:"Penumbra",url1:"https://www.penumbrainc.com/neuro-device/neuron-system/",minid:.04,maxod:.07992126},{type:"Balloon",name:"pITA RX Neuro PTA Balloon Catheter",manufacturer:"Phenox",image:"pita.png",url1:"https://phenox.net/international/uploads/KIF/KIF-0031C.pdf",url2:"https://phenox.net/international/pita-rx-neuro-pta-balloon-catheter/",minid:.015,maxod:.032808,length:160,comments:'Can be used for intracranial or extra cranial stenoses. Is rapid exchange. Has a hydrophilic coating. Diameter sizes from 1.25 to 4.0 mm and lengths from 10 to 40 mm. Compliance: "Non-/semi".'},{type:"Coil",name:"Avenir Wallaby Coil System",manufacturer:"Phenox",url1:"https://phenox.net//international/uploads/KIF/Avenir-KIF-0075A-WEB.pdf",url2:"https://phenox.net/international/avenir-wallaby-coil-system/",minid:0,maxod:.0155,length:"?",Detachment:"Mechanical",youtube:"https://www.youtube.com/embed/UhkhEXbIoRc"},{type:"Intrasaccular Device",name:"pCONUS 1 / 2 / mini",manufacturer:"Phenox",image:"pconus.png",Description:'"The pCONUS  Bifurcation  Aneurysm  Implant  is  a  new category of intraluminal device intended to treat complex,     wide     neck     intracranial     bifurcation     aneurysms. It  is  designed  to  support  the  coil  mass  at  the  levelof   the   neck   of   those   aneurysms   that   cannot   be easily coiled or surgically treated."',url1:"https://phenox.net/international/pconus-bifurcation-aneurysm-implant/",url2:"https://phenox.net/international/uploads/KIF/pCONUS_KIF-0020J_LR.pdf",minid:0,maxod:.02,Detachment:"Electrolytic",comments:"Available in 2 design shapes","Surface coating":"Available with Hydrophilic Polymer Coating (HPC)",Resheathable:"Completely resheathable."},{type:"Stent",name:"p64 MW Flow Modulation Device (all sizes)",manufacturer:"Phenox",url1:"https://phenox.net/international/uploads/KIF/pFMD-KIF-0057C_v2.pdf",minid:0,maxod:.02,length:"?",comments:"The p64 MW is for use in vessels 2.5 to 5 mm.",material:"Nitinol; Platinum",design:"Drawn  filled  tubing  (DFT)  wires: Nitinol braided outer tube with platinum core",features:"Antithrombotic HPC coating technology (optional)"},{type:"Stent",name:"p48 MW Flow Modulation Device (all sizes)",manufacturer:"Phenox",url1:"https://phenox.net/international/uploads/KIF/pFMD-KIF-0057C_v2.pdf",minid:0,maxod:.02,length:"?",comments:"The p48 MW is for use in vessels 1.75 to 3 mm.",material:"Nitinol; Platinum",design:"Drawn  filled  tubing  (DFT)  wires: Nitinol braided outer tube with platinum core",features:"Antithrombotic HPC coating technology (optional)"},{type:"Stent",name:"p64 Flow Modulation Device (all sizes)",manufacturer:"Phenox",url1:"https://phenox.net/international/uploads/KIF/p64_KIF-0008G_LR.pdf",minid:0,maxod:.026,length:"?",material:"Nitinol",design:"64 Nitinol braided wires"},{type:"Stent Retriever",name:"pRESET 4x20 / 5x40 / 6x30",manufacturer:"Phenox",url1:" 0","Stent length (mm)":"30"}]',tablecaption:"Catalogue",comments:"Can be used for aneurysm bridging, vessel dissection, or intracranial atherosclerotic disease. Has 3 proximal and distal markers.","Surface coating":"HPC antithrombogenic coating",design:"Self-expanding, open-cell"},{type:"Catheter",name:"Walrus",manufacturer:"Q’Apel",image:"walrus.png",Description:"Balloon guide catheter designed for thrombectomy. Relatively large internal diameter compared to other 8-French balloon guides. Designed to be easily trackable whilst providing good proximal support. The balloon inflates to 11.1 mm. The tip has dual radiopaque distal markers.",url1:"https://qapelmedical.com/walrus/",url2:"https://qapelmedical.com/walrus-clinicians/",minid:.087,maxod:.11,length:"90 / 95"},{type:"Catheter",name:"Wahoo",manufacturer:"Q’Apel",image:"wahoo.png",Description:'"Dual mode" philosophy described as easily trackable and but providing good proximal support without requiring a triaxial system. "SelectFlex" variable stiffness technology means the proximal catheter is stiff and the distal is flexible. Has a distal tip radiopaque marker.',url1:"https://qapelmedical.com/wahoo/",url2:"https://qapelmedical.com/wahoo-clinicians/",minid:.072,maxod:.095,length:105,material:"Nitinold scaffold and stainless steel reinforced shaft."},{type:"Catheter",name:"Armadillo",manufacturer:"Q’Apel",image:"armadillo.png",Description:`Guide catheter designed for transradial neurointervention: "

platform."`,url1:"https://qapelmedical.com/armadillo/",ifu:"https://qapelmedical.com/armadillo-clinicians/",minid:.072,maxod:.095,length:"95 / 105"},{type:"Stent",name:"Comaneci",manufacturer:"Rapid Medical",url1:"https://www.rapid-medical.com/comaneci",minid:0,maxod:.02,length:165,comments:`<p>There are 3 Comaneci devices which are sized according to the vessel diameter: </p>

<p>1.5 to 4.5 mm : Comaneci</p>
<p>1.5 to 3.5 mm : Comaneci petit</p>
<p>0.5 to 3 mm : Comaneci 17</p>

<p>The device is prepared as follows. Rinse the mesh (expandable tip) in saline. Check the opening and closing underwater. Next insert the sheath in to the RHV up to the microcatheter tip. Push the Comaneci in to the microcatheter. Peel away the sheath when fully inserted. </p>
<p>Unsheath the device - similar to unsheathing a stent - with the microcatheter across the neck of the aneurysm. The Comaneci can be used partly unsheathed if the entire length is not required. There is a distal wire tip extending beyond the expandable mesh - this enables the Comaneci to be positioned more distally, or pulled back, after unsheathing. If, however, the device is to be moved across a tight curve or a significant distance it is recommended to resheath fully inside the microcatheter first. </p>
<p> Draw the yellow slider on the Comaneci's handle back to open the device slowly click by click. Do not over expand the device. You may apply forward pressure on the microcatheter to bulge the Comaneci in to the aneurysm. It is possible to use 2 Comaneci together for wide neck bifurcation aneurysms (""Comaneci Kissing Technique""). Push the yellow slider forward to constrain the device. This is important to intermittently check for coil herniation. </p>
<p>It is recommended that the coiling microcatheter is retrieved whilst the Comaneci is open. When this has been achieved then close the Comaneci completely and resheath it before removing the Comaneci microcatheter. </p>`,"stent diameter mm":4.5,"stent length mm":32},{type:"Stent",name:"Comaneci Petit",manufacturer:"Rapid Medical",url1:"https://www.rapid-medical.com/comaneci",minid:0,maxod:.02,length:165,comments:`<p>There are 3 Comaneci devices which are sized according to the vessel diameter: </p>

<p>It is recommended that the coiling microcatheter is retrieved whilst the Comaneci is open. When this has been achieved then close the Comaneci completely and resheath it before removing the Comaneci microcatheter. </p>`,"stent diameter mm":3.5,"stent length mm":24},{type:"Stent",name:"Comaneci 17",manufacturer:"Rapid Medical",url1:"https://www.rapid-medical.com/comaneci",minid:0,maxod:.016,length:173,comments:`<p>There are 3 Comaneci devices which are sized according to the vessel diameter: </p>

<p> Draw the yellow slider on the Comaneci's handle back to open the device slowly click by click. Do not over expand the device. You may apply forward pressure on the microcatheter to bulge the Comaneci in to the aneurysm. It is possible to use 2 Comaneci together for wide neck bifurcation aneurysms (""Comaneci Kissing Technique""). Push the yellow slider forward to constrain the device. This is important to intermittently check for coil herniation. </p>

iques."',url1:"https://www.perfuze.com/our-solution",minid:.088,maxod:.105,comments:"Manufacturer testing suggests compatibility with the 6F Sofia Plus, Embovac, RED 68 and ACE68."},{type:"Liquid Embolic",name:"Menox",manufacturer:"Meril",Description:"Menox is a non adhesive liquid embolic agent intended for pre-operative embolization of Brain AVM’s. It is comprised of EVOH(Ethylene Vinyl alcohol) and DMSO(Dimethyl Sulphoxide), and suspended micronized tantalum powder to provide contrast during fluoroscopy. The recommended injection rate is 0.16ml/min. Injection rate shall not exceed 0.3ml/min.",url1:"https://www.merillife.com/medical-devices/vascular-intervention/peripheral-vascular/menox",url2:"https://www.merillife.com/assets/pdfs/medical-devices/menox-1603358656pdf.pdf",ifu:"https://www.accessdata.fda.gov/cdrh_docs/pdf6/H060003c.pdf",minid:0,maxod:.00903,length:"?",Strengths:"Menox 18 (5% EVOH), Menox 20 (6% EVOH) and Menox 34 (7% EVOH)",Preparation:"20 minutes on orbital shaker"},{type:"Select Catheter",name:"Impress 5F select",manufacturer:"Merit",Description:"Available in a range of tip shapes e.g. Berenstein, Simmons",url1:"https://www.merit.com/peripheral-intervention/angiography/diagnostic-peripheral-catheters/impress-diagnostic-peripheral-catheters/",minid:.04,maxod:.066,length:125,Code:"1628-094"},{type:"Stent",name:"Resolute Onyx RX 2.25-4.0 mm",manufacturer:"Medtronic",Description:"Balloon mounted coronary stent. Can be used off-label for intracranial atherosclerotic disease. Available in rapid exchange (RX) and over-the-wire (OTW) versions. Has a drug/polymer coating component, which consists of a formulation of zotarolimus contained in a BioLinx polymer.",url1:"https://www.medtronic.com/us-en/healthcare-professionals/products/cardiovascular/stents/resolute-onyx-des.html",url2:"https://www.accessdata.fda.gov/cdrh_docs/pdf16/P160043B.pdf",minid:.0145,maxod:.036,length:140,sizetable:'[{"Stent diameter (mm)":2,"8 mm Length":"RONYX20008UX","12 mm Length":
